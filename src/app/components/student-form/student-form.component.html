<div class="container">
    <h1>{{ isEditMode ? '✏️ Edit Student' : '➕ Add Student' }}</h1>

    <form (ngSubmit)="onSubmit()" class="form-card">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input id="firstName" type="text" [(ngModel)]="student.firstName" name="firstName" required
                placeholder="Enter first name">
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input id="lastName" type="text" [(ngModel)]="student.lastName" name="lastName" required
                placeholder="Enter last name">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" [(ngModel)]="student.email" name="email" required placeholder="Enter email">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Update' : 'Save' }}</button>
            <button type="button" class="btn btn-cancel" (click)="cancel()">Cancel</button>
        </div>
    </form>
</div>
